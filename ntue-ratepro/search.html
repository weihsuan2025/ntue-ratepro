<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>搜尋課程 | NTUE RatePro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<link rel="stylesheet" href="shared.css">
<style>
.search-topbar{background:var(--ntue);padding:.85rem 2rem;display:flex;align-items:center;gap:12px}
.search-topbar .nav-logo{color:#fff}
.search-wrap{flex:1;display:flex;align-items:center;background:rgba(255,255,255,.15);border-radius:9px;padding:0 14px;height:40px;gap:8px;max-width:500px}
.search-wrap input{flex:1;background:transparent;border:none;outline:none;color:#fff;font-size:14px;font-family:'Noto Sans TC',sans-serif}
.search-wrap input::placeholder{color:rgba(255,255,255,.55)}
.search-wrap i{color:rgba(255,255,255,.7);font-size:17px;flex-shrink:0}
.clear-btn{color:rgba(255,255,255,.65);font-size:15px;cursor:pointer;background:none;border:none;line-height:1}

.layout{display:grid;grid-template-columns:230px 1fr;min-height:calc(100vh - 58px - 58px);max-width:900px;margin:0 auto;gap:0}

.sidebar{background:#fff;border-right:1px solid var(--border);padding:1.5rem 1.25rem}
.filter-section{margin-bottom:1.75rem}
.filter-label{font-size:11px;letter-spacing:1.5px;color:var(--muted);font-weight:700;margin-bottom:.65rem;display:block;text-transform:uppercase}
.chip-group{display:flex;flex-wrap:wrap;gap:6px}
.chip{border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;color:var(--muted);cursor:pointer;background:#fff;transition:all .15s;user-select:none;white-space:nowrap}
.chip:hover{border-color:var(--ntue-mid)}
.chip.on{background:var(--ntue);color:#E8EDFF;border-color:var(--ntue)}
.chip.on.amber{background:#EF9F27;color:#412402;border-color:#EF9F27}
.chip.on.teal{background:#1D9E75;color:#E1F5EE;border-color:#1D9E75}

.sl-row{display:flex;align-items:center;gap:10px}
.sl-row input[type=range]{flex:1;accent-color:var(--ntue)}
.sl-row span{font-size:13px;font-weight:500;color:var(--ntue);min-width:36px;text-align:right}
.sl-tips{display:flex;justify-content:space-between;font-size:10px;color:#aaa;margin-top:2px}

.sort-row select{font-size:13px;border:1px solid var(--border);border-radius:7px;padding:5px 8px;background:#fff;color:var(--text);font-family:'Noto Sans TC',sans-serif;width:100%;cursor:pointer}

.result-area{padding:1.5rem;background:var(--bg)}
.result-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.25rem}
.result-count{font-size:13px;color:var(--muted)}
.result-count strong{color:var(--text);font-weight:500}
.result-list{display:flex;flex-direction:column;gap:14px}

.course-card{background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem 1.5rem;cursor:pointer;transition:border-color .15s,transform .15s;text-decoration:none;display:block;color:inherit}
.course-card:hover{border-color:var(--ntue-mid);transform:translateY(-1px)}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
.card-name{font-size:1rem;font-weight:500;color:var(--text);margin-bottom:4px}
.card-meta{font-size:12px;color:var(--muted)}
.card-right{display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0}
.rating-big{font-size:1.15rem;font-weight:700}
.card-tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:.65rem}
.card-divider{height:1px;background:var(--border);margin:.85rem 0}
.card-bottom{display:flex;justify-content:space-between;align-items:flex-end;gap:12px}
.card-review{font-size:12px;color:var(--muted);line-height:1.65;flex:1;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.mini-bars{display:flex;flex-direction:column;gap:4px;width:100px;flex-shrink:0}
.mb-row{display:flex;align-items:center;gap:5px}
.mb-label{font-size:10px;color:#aaa;width:28px;flex-shrink:0}
.mb-track{flex:1;height:5px;background:#eee;border-radius:99px;overflow:hidden}
.mb-fill{height:100%;border-radius:99px}

.empty{text-align:center;padding:4rem 1rem;color:var(--muted)}
.empty i{font-size:40px;display:block;margin-bottom:1rem;color:#ddd}

@media(max-width:640px){
  .layout{grid-template-columns:1fr}
  .sidebar{display:none}
}
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <a href="index.html" class="nav-logo">NTUE <span>RatePro</span></a>
    <div class="nav-links">
      <a href="search.html" style="color:var(--ntue)">搜尋課程</a>
      <a href="index.html#features">功能介紹</a>
    </div>
    <a href="search.html" class="nav-cta">搜尋課程</a>
  </div>
</nav>

<div class="search-topbar">
  <div class="search-wrap">
    <i class="ti ti-search"></i>
    <input type="text" id="searchInput" placeholder="搜尋課程名稱或教師姓名…">
    <button class="clear-btn" id="clearBtn" style="display:none" aria-label="清除"><i class="ti ti-x"></i></button>
  </div>
</div>

<div style="max-width:900px;margin:0 auto">
<div class="layout">
  <div class="sidebar">
    <div class="filter-section">
      <span class="filter-label">難易度</span>
      <div class="chip-group" id="diffFilter">
        <div class="chip on" data-val="all">全部</div>
        <div class="chip" data-val="latte">☕ 拿鐵</div>
        <div class="chip" data-val="americano">☕☕ 美式</div>
        <div class="chip" data-val="espresso">☕☕☕ 濃縮</div>
      </div>
    </div>
    <div class="filter-section">
      <span class="filter-label">系所</span>
      <div class="chip-group" id="deptFilter">
        <div class="chip on" data-val="all">全部</div>
        <div class="chip" data-val="edu">教育系</div>
        <div class="chip" data-val="cs">數位科技</div>
        <div class="chip" data-val="lang">語文教育</div>
        <div class="chip" data-val="art">藝術設計</div>
      </div>
    </div>
    <div class="filter-section">
      <span class="filter-label">給分甜度（最低）</span>
      <div class="sl-row">
        <input type="range" id="minRating" min="1" max="5" step="1" value="1">
        <span id="minRatingVal">1★</span>
      </div>
    </div>
    <div class="filter-section">
      <span class="filter-label">週投入時數（最多）</span>
      <div class="sl-row">
        <input type="range" id="maxHours" min="1" max="15" step="1" value="15">
        <span id="maxHoursVal">15hr</span>
      </div>
    </div>
    <div class="filter-section">
      <span class="filter-label">考核方式</span>
      <div class="chip-group" id="examFilter">
        <div class="chip" data-val="exam">筆試</div>
        <div class="chip" data-val="report">報告</div>
        <div class="chip" data-val="group">小組</div>
        <div class="chip" data-val="attend">出席</div>
      </div>
    </div>
    <div class="filter-section">
      <span class="filter-label">排序方式</span>
      <div class="sort-row"><select id="sortSelect">
        <option value="rating">給分甜度↓</option>
        <option value="reviews">評價數↓</option>
        <option value="hours">週時數↑</option>
        <option value="challenge">挑戰度↑</option>
      </select></div>
    </div>
  </div>

  <div class="result-area">
    <div class="result-header">
      <div class="result-count">找到 <strong id="countSpan">0</strong> 門課程</div>
    </div>
    <div class="result-list" id="resultList"></div>
  </div>
</div>
</div>

<script>
const COURSES=[
  {id:1,name:'教育心理學',teacher:'王美玲',dept:'edu',diff:'latte',rating:4.2,hours:2,challenge:2.1,content:3.6,attend:2.9,harvest:3.8,reviews:42,exams:['report','group','attend'],tags:['大學部必修','教育系'],review:'老師上課很活潑，期末報告題目自由度高，給分算甜。不太需要死背，理解重於記憶。'},
  {id:2,name:'統計學（含實習）',teacher:'陳志明',dept:'cs',diff:'espresso',rating:2.8,hours:7,challenge:4.5,content:4.8,attend:3.5,harvest:4.2,reviews:38,exams:['exam','report'],tags:['大學部必修','數位科技'],review:'期中期末都很硬，需要紮實算題。老師補充的實習課對理解幫助很大，但給分真的不甜。'},
  {id:3,name:'兒童文學',teacher:'林淑芬',dept:'lang',diff:'latte',rating:4.7,hours:2,challenge:1.5,content:3.2,attend:4.0,harvest:3.5,reviews:57,exams:['report','attend'],tags:['大學部選修','語文教育'],review:'超推薦的課！老師人很好，作業有趣，幾乎不點名但她記得每個學生的臉。'},
  {id:4,name:'課程設計與評量',teacher:'黃建國',dept:'edu',diff:'americano',rating:3.8,hours:4,challenge:3.2,content:4.1,attend:2.0,harvest:4.3,reviews:29,exams:['report','group'],tags:['師資培育','教育系'],review:'內容很扎實，對未來教書很有幫助。小組報告佔比重，需要找到好隊友。'},
  {id:5,name:'數位媒體設計',teacher:'蔡雅婷',dept:'art',diff:'americano',rating:4.0,hours:5,challenge:3.0,content:3.8,attend:2.5,harvest:4.0,reviews:31,exams:['report','group'],tags:['大學部選修','藝術設計'],review:'作品製作週期長但老師給很多建議。期末展覽很有成就感，適合有創作慾的人。'},
  {id:6,name:'Python程式設計',teacher:'吳俊宏',dept:'cs',diff:'americano',rating:3.5,hours:5,challenge:3.8,content:4.5,attend:1.5,harvest:4.4,reviews:44,exams:['exam','report'],tags:['大學部選修','數位科技'],review:'對完全沒基礎的人有點吃力，但老師課後很願意解惑。期末專案很好玩，學到很多。'},
  {id:7,name:'教育哲學',teacher:'許文傑',dept:'edu',diff:'espresso',rating:3.2,hours:6,challenge:4.2,content:4.7,attend:3.0,harvest:4.5,reviews:22,exams:['exam','report'],tags:['研究所','教育系'],review:'閱讀量很重，每週需要讀大量文獻。但對理解教育本質有深度幫助，有興趣的人很值得修。'},
  {id:8,name:'繪本創作與教學',teacher:'鄭美慧',dept:'art',diff:'latte',rating:4.5,hours:3,challenge:1.8,content:3.5,attend:3.5,harvest:3.8,reviews:35,exams:['report','attend'],tags:['大學部選修','藝術設計'],review:'超喜歡這門課！老師很會帶氣氛，期末自己做一本繪本超有成就感。'}
];
const DIFF_LABEL={latte:'☕ 拿鐵',americano:'☕☕ 美式',espresso:'☕☕☕ 濃縮'};
const DIFF_COLOR={latte:'teal',americano:'amber',espresso:'coral'};
const EXAM_LABEL={exam:'筆試',report:'報告',group:'小組作業',attend:'出席'};
const RATING_COLOR=r=>r>=4?'#1D9E75':r>=3?'#BA7517':'#D85A30';

let state={search:'',diff:'all',dept:'all',minRating:1,maxHours:15,exams:[],sort:'rating'};

function getFiltered(){
  return COURSES.filter(c=>{
    if(state.diff!=='all'&&c.diff!==state.diff)return false;
    if(state.dept!=='all'&&c.dept!==state.dept)return false;
    if(c.rating<state.minRating)return false;
    if(c.hours>state.maxHours)return false;
    if(state.exams.length>0&&!state.exams.some(e=>c.exams.includes(e)))return false;
    if(state.search){const q=state.search.toLowerCase();if(!c.name.toLowerCase().includes(q)&&!c.teacher.toLowerCase().includes(q))return false;}
    return true;
  }).sort((a,b)=>{
    if(state.sort==='rating')return b.rating-a.rating;
    if(state.sort==='reviews')return b.reviews-a.reviews;
    if(state.sort==='hours')return a.hours-b.hours;
    if(state.sort==='challenge')return a.challenge-b.challenge;
    return 0;
  });
}

function renderCard(c){
  const dc=DIFF_COLOR[c.diff];
  const bars=[
    {l:'給分',v:c.rating/5,col:'#F59F00'},
    {l:'挑戰',v:c.challenge/5,col:'#3B5BDB'},
    {l:'扎實',v:c.content/5,col:'#1D9E75'},
    {l:'點名',v:c.attend/5,col:'#D85A30'}
  ];
  return `<a class="course-card" href="course.html?id=${c.id}">
    <div class="card-top">
      <div style="flex:1;min-width:0">
        <div class="card-name">${c.name}</div>
        <div class="card-meta">${c.teacher} &nbsp;·&nbsp; ${c.reviews} 筆評價 &nbsp;·&nbsp; 週約 ${c.hours}hr</div>
      </div>
      <div class="card-right">
        <div style="text-align:right">
          <div style="font-size:10px;color:#aaa">給分甜度</div>
          <div class="rating-big" style="color:${RATING_COLOR(c.rating)}">★ ${c.rating.toFixed(1)}</div>
        </div>
        <span class="tag ${dc}">${DIFF_LABEL[c.diff]}</span>
      </div>
    </div>
    <div class="card-tags">
      ${c.tags.map(t=>`<span class="tag blue">${t}</span>`).join('')}
      ${c.exams.map(e=>`<span class="tag gray">${EXAM_LABEL[e]}</span>`).join('')}
    </div>
    <div class="card-divider"></div>
    <div class="card-bottom">
      <div class="card-review">${c.review}</div>
      <div class="mini-bars">
        ${bars.map(b=>`<div class="mb-row"><span class="mb-label">${b.l}</span><div class="mb-track"><div class="mb-fill" style="width:${Math.round(b.v*100)}%;background:${b.col}"></div></div></div>`).join('')}
      </div>
    </div>
  </a>`;
}

function render(){
  const list=getFiltered();
  document.getElementById('countSpan').textContent=list.length;
  const el=document.getElementById('resultList');
  if(!list.length){el.innerHTML=`<div class="empty"><i class="ti ti-mood-sad"></i>找不到符合條件的課程<br><span style="font-size:13px;margin-top:6px;display:block">試試調整篩選條件</span></div>`;return;}
  el.innerHTML=list.map(renderCard).join('');
}

document.getElementById('searchInput').addEventListener('input',function(){
  state.search=this.value;
  document.getElementById('clearBtn').style.display=this.value?'flex':'none';
  render();
});
document.getElementById('clearBtn').addEventListener('click',function(){
  document.getElementById('searchInput').value='';state.search='';this.style.display='none';render();
});
document.getElementById('diffFilter').addEventListener('click',e=>{
  const c=e.target.closest('.chip');if(!c)return;
  document.querySelectorAll('#diffFilter .chip').forEach(x=>x.classList.remove('on'));
  c.classList.add('on');state.diff=c.dataset.val;render();
});
document.getElementById('deptFilter').addEventListener('click',e=>{
  const c=e.target.closest('.chip');if(!c)return;
  document.querySelectorAll('#deptFilter .chip').forEach(x=>x.classList.remove('on'));
  c.classList.add('on');state.dept=c.dataset.val;render();
});
document.getElementById('examFilter').addEventListener('click',e=>{
  const c=e.target.closest('.chip');if(!c)return;
  c.classList.toggle('on');
  state.exams=[...document.querySelectorAll('#examFilter .chip.on')].map(x=>x.dataset.val);render();
});
document.getElementById('minRating').addEventListener('input',function(){
  state.minRating=+this.value;document.getElementById('minRatingVal').textContent=this.value+'★';render();
});
document.getElementById('maxHours').addEventListener('input',function(){
  state.maxHours=+this.value;document.getElementById('maxHoursVal').textContent=this.value+'hr';render();
});
document.getElementById('sortSelect').addEventListener('change',function(){state.sort=this.value;render();});

render();
</script>
</body>
</html>
